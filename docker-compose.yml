services:
  db:
    container_name: integrasys2-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: integrasys
      POSTGRES_USER: integrasys
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1ntegra@sys}
    ports:
      - "5432:5432"
    volumes:
      - integrasys_v2_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    container_name: integrasys2-backend
    build: ./backend
    environment:
      DATABASE_URL: postgresql://integrasys:${DB_PASSWORD:-1ntegra@sys}@db:5432/integrasys
      PORT: 5000
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    container_name: integrasys2-frontend
    build: ./frontend
    ports:
      - "8081:80"
    environment:
      BACKEND_URL: http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  integrasys_v2_data:
